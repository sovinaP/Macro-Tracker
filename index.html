<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0d6b63"><title>NourishOS 2.0 — Lean Bulk</title>
<style>
:root{--bg:#f5f6f3;--card:#fff;--soft:#eef5f2;--ink:#17211f;--muted:#697570;--line:#dbe4df;--brand:#0d6b63;--brand2:#09554f;--protein:#277f51;--carb:#b1761c;--fat:#bd6530;--danger:#b54148;--radius:18px;--shadow:0 8px 24px #17332a12}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:16px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding-bottom:84px}.app{max-width:650px;margin:auto;padding:16px}.top{display:flex;align-items:center;justify-content:space-between;margin:8px 0 18px}.brand{font-size:1.35rem;font-weight:800;letter-spacing:-.04em}.brand span{color:var(--brand)}.date{font-size:.84rem;color:var(--muted)}.page{display:none;gap:14px}.page.active{display:grid}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}.card h2,.card h3{margin:0 0 4px;letter-spacing:-.025em}.muted,.small{color:var(--muted)}.small{font-size:.84rem}.btn{appearance:none;border:0;border-radius:12px;min-height:44px;padding:10px 14px;background:#e7eeeb;color:var(--ink);font-weight:700;font-size:.92rem}.btn.primary{background:var(--brand);color:white}.btn.danger{background:#f8e9e9;color:var(--danger)}.btn.ghost{background:transparent;border:1px solid var(--line)}.btn:active{transform:scale(.98)}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.stack{display:grid;gap:10px}.hero{background:linear-gradient(145deg,#0d6b63,#123f3c);color:white;overflow:hidden}.hero .muted{color:#c3d9d4}.ringrow{display:flex;align-items:center;justify-content:center;gap:24px;margin:8px 0 0}.ring{width:185px;height:185px;border-radius:50%;background:conic-gradient(#82d1bf var(--p),#ffffff2e 0);display:grid;place-items:center;position:relative}.ring:before{content:"";position:absolute;inset:13px;background:#174b47;border-radius:50%}.ringinner{z-index:1;text-align:center}.ringinner b{display:block;font-size:2.35rem;letter-spacing:-.07em}.ringinner span{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#c9e5de}.sideval{text-align:center;min-width:55px}.sideval b{display:block;font-size:1.1rem}.sideval span{font-size:.72rem;color:#c3d9d4}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.metric b{display:block;font-size:.98rem}.bar{height:7px;border-radius:99px;background:#dfe8e3;margin-top:7px;overflow:hidden}.bar i{display:block;height:100%;border-radius:inherit;background:var(--brand)}.metric:nth-child(1) .bar i{background:var(--protein)}.metric:nth-child(2) .bar i{background:var(--carb)}.metric:nth-child(3) .bar i{background:var(--fat)}.badge{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;font-weight:800;padding:5px 8px;border-radius:999px;background:#e5f4ee;color:#176843}.badge.building{background:#f8efd9;color:#8b5a0a}.badge.low{background:#f8e8e8;color:#9e3d43}.status{padding:12px;border-radius:13px;background:var(--soft)}.nav{position:fixed;z-index:5;bottom:0;left:0;right:0;background:#fffffff2;backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;justify-content:center;padding:max(8px,env(safe-area-inset-bottom)) 8px 8px}.navin{width:min(650px,100%);display:grid;grid-template-columns:repeat(5,1fr);gap:3px}.tab{border:0;background:transparent;color:var(--muted);padding:7px 2px 4px;font-size:.65rem;font-weight:700}.tab b{display:block;font-size:1.25rem;line-height:1.2}.tab.active{color:var(--brand)}label{display:grid;gap:5px;font-size:.82rem;font-weight:700;color:#43504b}input,select{width:100%;border:1px solid var(--line);border-radius:11px;background:#fff;color:var(--ink);padding:11px;font:inherit;font-weight:500}input:focus,select:focus{outline:2px solid #0d6b6355;border-color:var(--brand)}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.seg button{border:1px solid var(--line);padding:10px 5px;background:#fff;border-radius:11px;font-weight:700;font-size:.82rem}.seg button.active{border-color:var(--brand);background:#e5f4ee;color:var(--brand)}.food{padding:12px 0;border-bottom:1px solid var(--line)}.food:last-child{border-bottom:0}.foodname{font-weight:800}.foodmeta{font-size:.79rem;color:var(--muted);margin-top:3px}.foodright{text-align:right;font-size:.8rem;white-space:nowrap}.searchbox{position:relative}.result{padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer}.result:last-child{border:0}.result b{font-size:.92rem}.result small{display:block;color:var(--muted);margin-top:2px}.empty{text-align:center;padding:25px 12px;color:var(--muted)}.notice{padding:12px;border-radius:12px;border:1px solid #c8e6db;background:#f2faf6;font-size:.9rem}.chart{height:145px;display:flex;align-items:end;gap:6px;padding-top:15px;border-bottom:1px solid var(--line)}.chart i{display:block;background:var(--brand);opacity:.72;flex:1;border-radius:7px 7px 0 0;min-width:6px}.modal{position:fixed;inset:0;z-index:20;background:#10201e88;display:none;align-items:end}.modal.show{display:flex}.sheet{width:min(650px,100%);max-height:92vh;overflow:auto;background:var(--bg);margin:auto;border-radius:22px 22px 0 0;padding:18px}.sheethead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.close{border:0;background:#e8efeb;border-radius:50%;height:34px;width:34px;font-size:20px}.toast{position:fixed;z-index:30;bottom:92px;left:50%;transform:translate(-50%,15px);background:#1e2926;color:white;padding:10px 14px;border-radius:99px;font-size:.84rem;opacity:0;transition:.2s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}.hidden{display:none!important}@media(max-width:380px){.ringrow{gap:12px}.ring{width:165px;height:165px}.ringinner b{font-size:2rem}.app{padding:12px}.metrics{gap:7px}}

[data-theme="dark"]{--bg:#121816;--card:#19221f;--soft:#20312b;--ink:#e7efeb;--muted:#aab8b2;--line:#33453e;--shadow:0 8px 24px #00000035}
[data-theme="dark"] .nav{background:#19221ff0}[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] .seg button{background:#1c2824;color:var(--ink);border-color:var(--line)}[data-theme="dark"] .btn{background:#273832;color:var(--ink)}[data-theme="dark"] .btn.ghost{background:transparent}[data-theme="dark"] .status{background:#20342c}[data-theme="dark"] .sheet{background:var(--bg)}
</style></head><body><main class="app"><header class="top"><div class="brand">Nourish<span>OS</span></div><div class="row" style="gap:8px"><button class="btn ghost" style="min-height:36px;padding:6px 10px" id="themeToggle" aria-label="Toggle dark mode">◐</button><div class="date" id="todayDate"></div></div></header>
<section id="today" class="page active"></section><section id="log" class="page"></section><section id="plan" class="page"></section><section id="trends" class="page"></section><section id="more" class="page"></section></main>
<nav class="nav"><div class="navin"><button class="tab active" data-tab="today"><b>◉</b>Today</button><button class="tab" data-tab="log"><b>＋</b>Log</button><button class="tab" data-tab="plan"><b>⌁</b>Plan</button><button class="tab" data-tab="trends"><b>⌁</b>Trends</button><button class="tab" data-tab="more"><b>•••</b>More</button></div></nav><div id="toast" class="toast"></div><div id="modal" class="modal"><div class="sheet" id="sheet"></div></div>
<script>
const DB='nourishos2',VER=1;let db, state={profile:null,foods:[],entries:[],weights:[],checks:[],adjustments:[]};function settings(){return state.profile?.settings||{theme:'light',accent:'#0d6b63'}}function applyAppearance(){let s=settings();document.documentElement.dataset.theme=s.theme||'light';document.documentElement.style.setProperty('--brand',s.accent||'#0d6b63');document.documentElement.style.setProperty('--brand2',s.accent||'#09554f');let b=document.querySelector('#themeToggle');if(b)b.textContent=s.theme==='dark'?'☀':'◐'}
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];const today=()=>new Date().toLocaleDateString('en-CA');const rnd=n=>Math.round(n);const uid=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+Math.random();
function openDB(){return new Promise((res,rej)=>{let r=indexedDB.open(DB,VER);r.onupgradeneeded=e=>{let d=e.target.result;['profile','foods','entries','weights','checks','adjustments'].forEach(n=>d.createObjectStore(n,{keyPath:'id'}));};r.onsuccess=e=>{db=e.target.result;res()};r.onerror=()=>rej(r.error)})}function all(store){return new Promise(res=>{let r=db.transaction(store).objectStore(store).getAll();r.onsuccess=()=>res(r.result||[])})}function put(store,v){return new Promise(res=>{let r=db.transaction(store,'readwrite').objectStore(store).put(v);r.onsuccess=()=>res()})}function del(store,id){return new Promise(res=>{let r=db.transaction(store,'readwrite').objectStore(store).delete(id);r.onsuccess=()=>res()})}
async function load(){for(let x of ['profile','foods','entries','weights','checks','adjustments'])state[x]=await all(x);state.profile=state.profile[0]||null}async function saveProfile(p){await put('profile',{...p,id:'main'});await load()}function toast(s){let t=$('#toast');t.textContent=s;t.classList.add('show');clearTimeout(t.x);t.x=setTimeout(()=>t.classList.remove('show'),2400)}
const macros=f=>({cal:Number(f.cal)||0,p:Number(f.p)||0,c:Number(f.c)||0,f:Number(f.f)||0});function dateEntries(d=today()){return state.entries.filter(x=>x.date===d)}function totals(d=today()){return dateEntries(d).reduce((a,x)=>{a.cal+=+x.cal;a.p+=+x.p;a.c+=+x.c;a.f+=+x.f;return a},{cal:0,p:0,c:0,f:0})}function target(){let p=state.profile;if(!p)return {cal:2600,p:160,c:330,f:80};return p.targets}function pct(a,b){return Math.min(100,Math.max(0,a/b*100))}function dateFmt(d){return new Date(d+'T12:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'})}
function trend(){let a=state.weights.slice().sort((x,y)=>x.date.localeCompare(y.date)).slice(-7);if(!a.length)return null;return a.reduce((s,x)=>s+Number(x.lb),0)/a.length}function weeklyRate(){let a=state.weights.slice().sort((x,y)=>x.date.localeCompare(y.date));if(a.length<4)return null;let recent=a.slice(-4),old=a.slice(-8,-4);if(!old.length)return null;return (recent.reduce((s,x)=>s+ +x.lb,0)/recent.length-old.reduce((s,x)=>s+ +x.lb,0)/old.length)*7/Math.max(1,parseInt(recent[recent.length-1].date.slice(-2))-parseInt(old[0].date.slice(-2))||7)}function completed7(){let ds=[];for(let i=0;i<7;i++){let d=new Date();d.setDate(d.getDate()-i);ds.push(d.toLocaleDateString('en-CA'))}return state.checks.filter(x=>x.complete&&ds.includes(x.date)).length}function weighins7(){let ds=[];for(let i=0;i<7;i++){let d=new Date();d.setDate(d.getDate()-i);ds.push(d.toLocaleDateString('en-CA'))}return state.weights.filter(x=>ds.includes(x.date)).length}
function renderToday(){if(!state.profile)return renderOnboard();let t=target(),x=totals(),rem=t.cal-x.cal,phase=state.profile.phase,comp=completed7(),wis=weighins7(),conf=comp>=5&&wis>=4?'Strong':comp>=3&&wis>=3?'Building':'Learning';let rate=weeklyRate(),rateText=rate===null?'Collecting trend data':(rate>0?'+':'')+rate.toFixed(2)+' lb/week';$('#today').innerHTML=`<div class="hero card"><div class="row"><div><span class="badge ${conf==='Strong'?'':'building'}">${phase} · ${conf}</span><h2 style="margin-top:9px">${phase==='Lean Bulk'?'Build with control':phase==='Cut'?'Cut with control':'Stay on target'}</h2><p class="muted">Automatic weekly updates are ${conf==='Strong'?'ready':'still learning'}.</p></div><button class="btn" onclick="go('plan')">Plan</button></div><div class="ringrow"><div class="sideval"><b>${Math.max(0,rnd(rem))}</b><span>remaining</span></div><div class="ring" style="--p:${pct(x.cal,t.cal)}%"><div class="ringinner"><b>${rnd(x.cal)}</b><span>of ${rnd(t.cal)} kcal</span></div></div><div class="sideval"><b>${rnd(t.cal)}</b><span>target</span></div></div></div><div class="card"><div class="row"><div><h3>Today’s macros</h3><span class="small">Protein and fat stay stable; carbs flex with calories.</span></div><button class="btn primary" onclick="go('log')">Log food</button></div><div class="metrics" style="margin-top:14px">${[['Protein',x.p,t.p,'g'],['Carbs',x.c,t.c,'g'],['Fat',x.f,t.f,'g']].map(v=>`<div class="metric"><span class="small">${v[0]}</span><b>${rnd(v[1])}/${rnd(v[2])}${v[3]}</b><div class="bar"><i style="width:${pct(v[1],v[2])}%"></i></div></div>`).join('')}</div></div><div class="card stack"><div class="row"><div><h3>Trend check</h3><span class="small">${rateText} · ${wis}/7 weigh-ins</span></div><span class="badge ${conf==='Strong'?'':'building'}">${conf}</span></div><div class="status">${conf==='Strong'?`Your data is eligible for weekly adaptive adjustments. Estimated maintenance is currently <b>${rnd(state.profile.maintenance)} kcal</b>.`:`Log ${Math.max(0,5-comp)} more complete day${Math.max(0,5-comp)===1?'':'s'} and ${Math.max(0,4-wis)} more weigh-in${Math.max(0,4-wis)===1?'':'s'} for stronger automatic coaching.`}</div></div><div class="card row"><div><h3>Food log complete?</h3><span class="small">Only complete days teach your plan.</span></div><button class="btn ${state.checks.find(x=>x.date===today()&&x.complete)?'':'primary'}" onclick="markComplete()">${state.checks.find(x=>x.date===today()&&x.complete)?'✓ Complete':'Mark complete'}</button></div>`}
function renderLog(){let es=dateEntries();$('#log').innerHTML=`<div class="card"><div class="row"><div><h2>Food log</h2><p class="muted">Search what you mean—brands and typos included.</p></div><button class="btn primary" onclick="openManual()">Manual</button></div><div class="searchbox"><input id="search" placeholder="Try “fairlife choc” or “premier protien”" autocomplete="off"><div id="results"></div></div></div><div class="card"><div class="row"><h3>Today · ${rnd(totals().cal)} kcal</h3><button class="btn ghost" onclick="openWeight()">Log weight</button></div><div id="entries">${es.length?es.map(e=>`<div class="food row"><div><div class="foodname">${esc(e.name)}</div><div class="foodmeta">${e.meal} · P ${rnd(e.p)}g · C ${rnd(e.c)}g · F ${rnd(e.f)}g</div></div><div class="foodright"><b>${rnd(e.cal)} kcal</b><br><button style="border:0;background:none;color:var(--danger);font-size:.75rem" onclick="removeEntry('${e.id}')">Remove</button></div></div>`).join(''):`<div class="empty">Nothing logged yet. Search a food or add a nutrition label.</div>`}</div></div><div class="card"><h3>Recent & saved</h3><div id="recent">${state.foods.slice().sort((a,b)=>(b.lastUsed||'').localeCompare(a.lastUsed||'')).slice(0,6).map(f=>`<div class="result" onclick="selectFood('${f.id}')"><b>${esc(f.name)}</b><small>${esc(f.brand||'Saved food')} · ${rnd(f.cal)} kcal · P ${rnd(f.p)}g</small></div>`).join('')||'<p class="small">Your saved and confirmed foods will appear here.</p>'}</div></div>`;$('#search').addEventListener('input',e=>smartSearch(e.target.value))}
function normalize(q){let map={'protien':'protein','chik':'chick','chickfila':'chick fil a','fair life':'fairlife','pb':'peanut butter','coke zero':'coca cola zero','oikos 0':'oikos triple zero','choc':'chocolate','nugs':'nuggets'};q=q.toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();Object.entries(map).forEach(([a,b])=>q=q.replaceAll(a,b));return q}function score(q,s){let qt=normalize(q).split(' '),h=normalize(s);return qt.reduce((n,t)=>n+(h.includes(t)?12:0),h.includes(normalize(q))?25:0)}async function smartSearch(q){let box=$('#results');if(q.trim().length<2){box.innerHTML='';return}let local=state.foods.map(f=>({f,score:score(q,(f.brand||'')+' '+f.name)})).filter(x=>x.score).sort((a,b)=>b.score-a.score).slice(0,5);box.innerHTML=local.map(x=>`<div class="result" onclick="selectFood('${x.f.id}')"><b>${esc(x.f.name)}</b><small>${esc(x.f.brand||'Saved')} · ${rnd(x.f.cal)} kcal · P ${rnd(x.f.p)}g</small></div>`).join('')+'<div class="small" style="padding:10px 0">Searching packaged-food database…</div>';try{let u='https://world.openfoodfacts.org/api/v2/search?categories_tags_en=foods&fields=product_name,brands,nutriments,serving_size,serving_quantity&search_terms='+encodeURIComponent(normalize(q))+'&page_size=10';let d=await fetch(u).then(r=>r.json()),items=(d.products||[]).filter(p=>p.product_name).map(p=>({name:p.product_name,brand:p.brands||'Open Food Facts',cal:Math.round(p.nutriments?.['energy-kcal_100g']||0),p:+(p.nutriments?.proteins_100g||0),c:+(p.nutriments?.carbohydrates_100g||0),f:+(p.nutriments?.fat_100g||0),source:'Open Food Facts',per100:true})).sort((a,b)=>score(q,b.brand+' '+b.name)-score(q,a.brand+' '+a.name)).slice(0,7);box.innerHTML=local.map(x=>`<div class="result" onclick="selectFood('${x.f.id}')"><b>${esc(x.f.name)}</b><small>Saved · ${rnd(x.f.cal)} kcal · P ${rnd(x.f.p)}g</small></div>`).join('')+items.map((f,i)=>`<div class="result" onclick="quickFood(decodeURIComponent('${encodeURIComponent(JSON.stringify(f))}'))"><b>${esc(f.name)}</b><small>${esc(f.brand)} · ${rnd(f.cal)} kcal · P ${rnd(f.p)}g <em>per 100 g</em></small></div>`).join('')||'<div class="small" style="padding:10px">No product match. Add it manually.</div>'}catch(e){box.innerHTML+='<div class="small">Could not reach food search. Your saved foods still work offline.</div>'}}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function go(t){$$('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));$$('.page').forEach(p=>p.classList.toggle('active',p.id===t));render();window.scrollTo({top:0,behavior:'smooth'})}function render(){if(!state.profile){renderOnboard();return}renderToday();renderLog();renderPlan();renderTrends();renderMore()}
function renderOnboard(){$('#today').innerHTML=`<div class="hero card"><span class="badge">NourishOS 2.0</span><h2 style="margin-top:10px">Build your plan around the lift.</h2><p class="muted">Local-first nutrition coaching for cut, maintain, and lean bulk.</p></div><div class="card stack"><h2>Set up your starting plan</h2><p class="muted">This is a starting estimate. Your targets adapt after consistent food and weight logs.</p><div class="grid2"><label>Bodyweight (lb)<input id="obw" type="number" placeholder="185"></label><label>Height<input id="oht" placeholder="5 ft 10 in"></label></div><div class="grid2"><label>Age<input id="oage" type="number" placeholder="25"></label><label>Sex<select id="osex"><option value="male">Male</option><option value="female">Female</option></select></label></div><label>Activity level<select id="oact"><option value="1.2">Sedentary</option><option value="1.375">Lightly active</option><option value="1.55" selected>Moderately active</option><option value="1.725">Very active</option></select></label><label>Starting phase<div class="seg" id="phaseSeg"><button class="active" data-phase="Lean Bulk">Lean Bulk</button><button data-phase="Maintain">Maintain</button><button data-phase="Cut">Cut</button></div></label><label>Lean-bulk target rate<select id="orate"><option value="0.25">Conservative · +0.25%/week</option><option value="0.4" selected>Standard · +0.40%/week</option><option value="0.6">Faster · +0.60%/week</option></select></label><button class="btn primary" onclick="finishOnboard()">Create my plan</button></div>`;$$('#phaseSeg button').forEach(b=>b.onclick=()=>{$$('#phaseSeg button').forEach(x=>x.classList.remove('active'));b.classList.add('active')})}
async function finishOnboard(){let bw=+$('#obw').value,age=+$('#oage').value,act=+$('#oact').value;if(!bw||!age){toast('Add bodyweight and age first.');return}let h=$('#oht').value.match(/(\d+).*?(\d+)?/),inch=h?(+h[1]*12 + +(h[2]||0)):70,kg=bw*.453592,cm=inch*2.54,sex=$('#osex').value,bmr=10*kg+6.25*cm-5*age+(sex==='male'?5:-161),maint=rnd(bmr*act),phase=$('#phaseSeg .active').dataset.phase,rate=+$('#orate').value,delta=rnd(bw*rate/100*500),cal=phase==='Lean Bulk'?maint+delta:phase==='Cut'?maint-delta:maint,p=rnd(bw*.8),f=rnd(Math.max(bw*.3,cal*.22/9)),c=rnd(Math.max(0,(cal-p*4-f*9)/4));await saveProfile({phase,rate,bw,age,sex,activity:act,maintenance:maint,auto:true,created:today(),settings:{theme:'light',accent:'#0d6b63'},targets:{cal,p,c,f}});toast('Plan created. Start logging.');render()}
function renderPlan(){let p=state.profile,t=p.targets;$('#plan').innerHTML=`<div class="card"><div class="row"><div><h2>Your plan</h2><p class="muted">Targets update automatically when enough data is available.</p></div><span class="badge">Auto on</span></div><div class="seg" id="planPhase" style="margin:12px 0">${['Lean Bulk','Maintain','Cut'].map(x=>`<button class="${p.phase===x?'active':''}" data-p="${x}">${x}</button>`).join('')}</div><div class="grid2"><label>Target rate (% bodyweight/week)<input id="prate" type="number" min="0" step=".05" value="${p.rate}"></label><label>Weekly update day<select id="pday"><option>Monday</option></select></label></div><div class="grid2"><label>Protein (g/day)<input id="pp" type="number" value="${t.p}"></label><label>Fat floor (g/day)<input id="pf" type="number" value="${t.f}"></label></div><label>Automatic adjustment cap (kcal/day)<select id="pcap"><option value="75">75 kcal</option><option value="100" selected>100 kcal</option><option value="150">150 kcal</option></select></label><button class="btn primary" onclick="savePlan()">Save plan settings</button></div><div class="card"><h3>Current targets</h3><div class="grid3" style="margin-top:10px"><div><span class="small">Calories</span><b>${rnd(t.cal)}</b></div><div><span class="small">Protein</span><b>${rnd(t.p)}g</b></div><div><span class="small">Carbs</span><b>${rnd(t.c)}g</b></div></div><p class="small" style="margin-top:14px">Your weekly check-in will only adjust calories when at least 5 of 7 days are marked complete and 4 of 7 weigh-ins are logged.</p></div>`;$$('#planPhase button').forEach(b=>b.onclick=()=>{$$('#planPhase button').forEach(x=>x.classList.remove('active'));b.classList.add('active')})}
async function savePlan(){let p=state.profile,phase=$('#planPhase .active').dataset.p,rate=+$('#prate').value,protein=+$('#pp').value,fat=+$('#pf').value,cal=p.targets.cal;if(phase!==p.phase){let delta=rnd(p.bw*rate/100*500);cal=phase==='Lean Bulk'?p.maintenance+delta:phase==='Cut'?p.maintenance-delta:p.maintenance}let carbs=rnd(Math.max(0,(cal-protein*4-fat*9)/4));await saveProfile({...p,phase,rate,cap:+$('#pcap').value,targets:{cal,p:protein,f:fat,c:carbs}});toast('Plan saved.');render()}
function renderTrends(){let ws=state.weights.slice().sort((a,b)=>a.date.localeCompare(b.date)).slice(-14), max=Math.max(...ws.map(x=>+x.lb),1),min=Math.min(...ws.map(x=>+x.lb),max),tr=trend();$('#trends').innerHTML=`<div class="card"><div class="row"><div><h2>Bodyweight trend</h2><p class="muted">Use consistent morning weigh-ins when possible.</p></div><button class="btn primary" onclick="openWeight()">Add weight</button></div>${ws.length?`<div class="chart">${ws.map(x=>`<i title="${x.date}: ${x.lb} lb" style="height:${Math.max(18,30+(+x.lb-min)/(Math.max(.1,max-min))*90)}%"></i>`).join('')}</div><div class="row small" style="margin-top:8px"><span>${dateFmt(ws[0].date)}</span><b>${tr?.toFixed(1)} lb trend</b><span>${dateFmt(ws.at(-1).date)}</span></div>`:`<div class="empty">Add a few weigh-ins to see your bodyweight trend.</div>`}</div><div class="card"><h3>Plan data quality</h3><div class="stack" style="margin-top:12px"><div class="row"><span>Complete food logs, last 7 days</span><b>${completed7()}/7</b></div><div class="row"><span>Weigh-ins, last 7 days</span><b>${weighins7()}/7</b></div><div class="row"><span>Estimated maintenance</span><b>${rnd(state.profile.maintenance)} kcal</b></div></div></div>`}
function renderMore(){let s=settings();$('#more').innerHTML=`<div class="card stack"><h2>Appearance</h2><div class="row"><div><b>Dark mode</b><div class="small">Easy on the eyes for late-night logging.</div></div><button class="btn ${s.theme==='dark'?'primary':''}" onclick="toggleTheme()">${s.theme==='dark'?'On':'Off'}</button></div><label>Accent color<select id="accentSelect" onchange="setAccent(this.value)"><option value="#0d6b63" ${s.accent==='#0d6b63'?'selected':''}>Evergreen</option><option value="#3269b8" ${s.accent==='#3269b8'?'selected':''}>Cobalt</option><option value="#8b5e34" ${s.accent==='#8b5e34'?'selected':''}>Copper</option><option value="#8d4e83" ${s.accent==='#8d4e83'?'selected':''}>Plum</option><option value="#b84d45" ${s.accent==='#b84d45'?'selected':''}>Ember</option></select></label></div><div class="card stack"><h2>More</h2><button class="btn ghost" onclick="exportData()">Export backup</button><label class="btn ghost" style="text-align:center;cursor:pointer">Import backup<input type="file" accept="application/json" class="hidden" onchange="importData(event)"></label><button class="btn ghost" onclick="showAbout()">How adaptive coaching works</button></div><div class="card"><h3>Local-first by design</h3><p class="muted">Your NourishOS data lives on this device. Export a backup regularly before changing phones or clearing browser data.</p></div><div class="card"><button class="btn danger" onclick="resetApp()">Reset all local data</button></div>`}
function sheet(html){$('#sheet').innerHTML=html;$('#modal').classList.add('show')}function closeSheet(){$('#modal').classList.remove('show')}$('#modal').onclick=e=>{if(e.target.id==='modal')closeSheet()}
function openManual(f={}){sheet(`<div class="sheethead"><div><h2>${f.name?'Confirm food':'Manual food'}</h2><p class="muted">Use label values per serving.</p></div><button class="close" onclick="closeSheet()">×</button></div><div class="stack"><label>Food name<input id="fn" value="${esc(f.name||'')}" placeholder="e.g., Fairlife Core Power Elite"></label><label>Brand (optional)<input id="fb" value="${esc(f.brand||'')}"></label><div class="grid2"><label>Serving label<input id="fs" value="${esc(f.serving|| (f.per100?'100 g':'1 serving'))}"></label><label>Meal<select id="fm"><option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Snack</option></select></label></div><div class="grid2"><label>Calories<input id="fcal" type="number" value="${f.cal??''}"></label><label>Protein (g)<input id="fp" type="number" step=".1" value="${f.p??''}"></label></div><div class="grid2"><label>Carbs (g)<input id="fc" type="number" step=".1" value="${f.c??''}"></label><label>Fat (g)<input id="ff" type="number" step=".1" value="${f.f??''}"></label></div><div class="grid2"><button class="btn ghost" onclick="saveFoodOnly()">Save to library</button><button class="btn primary" onclick="addFood()">Add to log</button></div></div>`)}
function quickFood(encoded){openManual(JSON.parse(encoded))}function selectFood(id){let f=state.foods.find(x=>x.id===id);openManual(f)}function formFood(){return {id:uid(),name:$('#fn').value.trim(),brand:$('#fb').value.trim(),serving:$('#fs').value,meal:$('#fm').value,cal:+$('#fcal').value||0,p:+$('#fp').value||0,c:+$('#fc').value||0,f:+$('#ff').value||0,lastUsed:today()}}async function saveFoodOnly(){let f=formFood();if(!f.name){toast('Enter a food name.');return}await put('foods',f);await load();closeSheet();toast('Saved to your library.');render()}async function addFood(){let f=formFood();if(!f.name){toast('Enter a food name.');return}let e={...f,id:uid(),date:today()};await put('entries',e);let saved=state.foods.find(x=>x.name===f.name&&x.brand===f.brand);if(saved)await put('foods',{...saved,...f,id:saved.id});else await put('foods',f);await load();closeSheet();toast('Added to today.');render()}async function removeEntry(id){await del('entries',id);await load();render()}async function openWeight(){let ex=state.weights.find(x=>x.date===today());sheet(`<div class="sheethead"><div><h2>Morning weigh-in</h2><p class="muted">One weight per day is enough.</p></div><button class="close" onclick="closeSheet()">×</button></div><div class="stack"><label>Bodyweight (lb)<input id="wlb" type="number" step=".1" value="${ex?.lb||''}" placeholder="185.4"></label><button class="btn primary" onclick="saveWeight()">Save weigh-in</button></div>`)}async function saveWeight(){let lb=+$('#wlb').value;if(!lb){toast('Enter a weight.');return}let old=state.weights.find(x=>x.date===today());await put('weights',{id:old?.id||uid(),date:today(),lb});await load();closeSheet();toast('Weigh-in saved.');render()}async function markComplete(){let x=state.checks.find(x=>x.date===today());await put('checks',{id:x?.id||uid(),date:today(),complete:true});await load();toast('Today marked complete.');render()}async function setAccent(accent){if(!state.profile)return;await saveProfile({...state.profile,settings:{...settings(),accent}});applyAppearance();renderMore();toast('Accent updated.')}async function toggleTheme(){if(!state.profile)return;let theme=settings().theme==='dark'?'light':'dark';await saveProfile({...state.profile,settings:{...settings(),theme}});applyAppearance();render();toast(theme==='dark'?'Dark mode on.':'Light mode on.')}function exportData(){let b=new Blob([JSON.stringify({version:1,exported:new Date().toISOString(),state},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='nourishos-backup-'+today()+'.json';a.click();URL.revokeObjectURL(a.href);toast('Backup downloaded.')}async function importData(e){try{let o=JSON.parse(await e.target.files[0].text());if(!o.state)throw 0;for(let s of ['profile','foods','entries','weights','checks','adjustments'])for(let v of (Array.isArray(o.state[s])?o.state[s]:o.state[s]?[o.state[s]]:[]))await put(s,v);await load();toast('Backup imported.');render()}catch{x=0;toast('That backup could not be imported.')}}function showAbout(){sheet(`<div class="sheethead"><h2>Adaptive coaching</h2><button class="close" onclick="closeSheet()">×</button></div><div class="stack muted"><p>NourishOS starts from your body metrics and selected phase. As you mark food days complete and add weigh-ins, it builds a more personal maintenance estimate.</p><p>Weekly auto-adjustments are enabled once the previous 7 days include at least 5 complete food logs and 4 weigh-ins. Protein and fat stay locked to your choices; carbohydrates change with calories.</p><p>Early build note: this iteration records data quality and targets. The next engine pass will calculate and write the automatic weekly adjustment history from the collected trend data.</p></div>`)}async function resetApp(){if(!confirm('Delete all NourishOS data on this device?'))return;indexedDB.deleteDatabase(DB);location.reload()}
(async()=>{await openDB();await load();applyAppearance();$('#themeToggle').onclick=toggleTheme;$('#todayDate').textContent=new Date().toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});$$('.tab').forEach(b=>b.onclick=()=>go(b.dataset.tab));render()})()
</script></body></html>
